<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercari Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            padding: 16px;
            padding-bottom: 80px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .balance {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
        }
        .search-box {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--tg-theme-hint-color);
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            font-size: 16px;
            margin-bottom: 16px;
        }
        .search-box:focus {
            outline: none;
            border-color: var(--tg-theme-button-color);
        }
        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .product-card {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .product-card:active {
            transform: scale(0.96);
        }
        .product-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }
        .product-info {
            padding: 10px;
        }
        .product-title {
            font-size: 13px;
            font-weight: 500;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .product-price {
            font-size: 16px;
            font-weight: 700;
            margin-top: 4px;
            color: var(--tg-theme-button-color);
        }
        .bottom-menu {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--tg-theme-secondary-bg-color);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid var(--tg-theme-hint-color);
        }
        .bottom-menu button {
            background: none;
            border: none;
            color: var(--tg-theme-hint-color);
            font-size: 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        .bottom-menu button.active {
            color: var(--tg-theme-button-color);
        }
        .bottom-menu button .icon {
            font-size: 22px;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--tg-theme-hint-color);
        }
        .cart-total {
            margin-top: 16px;
            font-size: 18px;
            font-weight: 700;
            text-align: right;
        }
        .buy-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--tg-theme-hint-color);
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <!-- ШАПКА -->
    <div class="header">
        <h2>🛍️ Mercari Shop</h2>
        <div class="balance" id="balanceDisplay">💰 $0.00</div>
    </div>

    <!-- ПОИСК -->
    <input class="search-box" id="searchInput" placeholder="🔍 Найти товар..." type="text">

    <!-- ВКЛАДКИ -->
    <div id="catalog" class="tab-content active">
        <div class="product-grid" id="productGrid">
            <!-- Карточки товаров будут здесь -->
        </div>
    </div>

    <div id="cart" class="tab-content">
        <div id="cartItems"></div>
        <div class="cart-total" id="cartTotal">Итого: $0.00</div>
        <button class="buy-btn" id="checkoutBtn">💳 Оформить заказ</button>
    </div>

    <div id="orders" class="tab-content">
        <div id="ordersList">
            <div class="empty-state">
                <div class="icon">📦</div>
                <p>У вас пока нет заказов</p>
            </div>
        </div>
    </div>

    <!-- НИЖНЕЕ МЕНЮ -->
    <div class="bottom-menu">
        <button class="active" data-tab="catalog">
            <span class="icon">🏠</span>
            Каталог
        </button>
        <button data-tab="cart">
            <span class="icon">🛒</span>
            Корзина (<span id="cartCount">0</span>)
        </button>
        <button data-tab="orders">
            <span class="icon">📋</span>
            Заказы
        </button>
    </div>

    <script>
        // ============================================================
        // 1. ИНИЦИАЛИЗАЦИЯ TELEGRAM WEB APP
        // ============================================================
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // растягиваем на весь экран

        // Получаем данные пользователя
        const user = tg.initDataUnsafe?.user || { id: 123, first_name: 'Guest' };
        console.log('👤 Пользователь:', user);

        // ============================================================
        // 2. СОСТОЯНИЕ (как в боте)
        // ============================================================
        let state = {
            balance: 0,
            cart: [],
            orders: [],
            products: [],
            currentTab: 'catalog'
        };

        // ============================================================
        // 3. ТЕСТОВЫЕ ТОВАРЫ (позже заменим на реальные из Apify)
        // ============================================================
        const mockProducts = [
            { id: 1, title: 'Louis Vuitton モノグラム ショルダーバッグ', price_usd: 207.00, price_jpy: 30000, image: 'https://static.mercdn.net/item/detail/orig/photos/m87435084112_1.jpg?1725431234' },
            { id: 2, title: 'Nintendo Switch 本体 有機ELモデル', price_usd: 220.00, price_jpy: 32000, image: 'https://static.mercdn.net/item/detail/orig/photos/m12330654583_1.jpg?1725431234' },
            { id: 3, title: 'iPhone 14 Pro Max 256GB シノワ', price_usd: 690.00, price_jpy: 100000, image: 'https://static.mercdn.net/item/detail/orig/photos/m12330654583_2.jpg?1725431234' },
            { id: 4, title: 'ルイヴィトン モノグラム ポーチ', price_usd: 72.40, price_jpy: 10500, image: 'https://static.mercdn.net/item/detail/orig/photos/m70186945300_1.jpg?1725431234' },
            { id: 5, title: 'Louis Vuitton ヴェルニ 長財布', price_usd: 48.30, price_jpy: 7000, image: 'https://static.mercdn.net/item/detail/orig/photos/m87785465597_1.jpg?1725431234' },
        ];

        // ============================================================
        // 4. ЗАГРУЗКА БАЛАНСА ИЗ БОТА
        // ============================================================
        function loadBalance() {
            // В реальном проекте — запрос к API твоего бота
            // Пока используем локальное хранилище
            const saved = localStorage.getItem('balance');
            state.balance = saved ? parseFloat(saved) : 0;
            updateBalanceDisplay();
        }

        function saveBalance() {
            localStorage.setItem('balance', state.balance.toString());
        }

        function updateBalanceDisplay() {
            document.getElementById('balanceDisplay').textContent = `💰 $${state.balance.toFixed(2)}`;
        }

        // ============================================================
        // 5. ОТОБРАЖЕНИЕ ТОВАРОВ
        // ============================================================
        function renderProducts(products) {
            const grid = document.getElementById('productGrid');
            if (!products || products.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1;" class="empty-state">
                        <div class="icon">🔍</div>
                        <p>Товары не найдены</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = products.map(p => `
                <div class="product-card" onclick="addToCart(${p.id})">
                    <img src="${p.image}" alt="${p.title}" onerror="this.src='https://via.placeholder.com/150x150?text=No+Image'">
                    <div class="product-info">
                        <div class="product-title">${p.title}</div>
                        <div class="product-price">$${p.price_usd.toFixed(2)}</div>
                    </div>
                </div>
            `).join('');
        }

        // ============================================================
        // 6. КОРЗИНА
        // ============================================================
        function addToCart(productId) {
            const product = state.products.find(p => p.id === productId);
            if (!product) return;

            const existing = state.cart.find(item => item.id === productId);
            if (existing) {
                existing.quantity += 1;
            } else {
                state.cart.push({ ...product, quantity: 1 });
            }

            tg.HapticFeedback.impactOccurred('light');
            updateCartUI();
            showToast(`✅ ${product.title.substring(0, 30)}... добавлен в корзину`);
        }

        function removeFromCart(productId) {
            state.cart = state.cart.filter(item => item.id !== productId);
            updateCartUI();
        }

        function updateCartUI() {
            const count = state.cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = count;

            const container = document.getElementById('cartItems');
            if (state.cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🛒</div>
                        <p>Корзина пуста</p>
                    </div>
                `;
                document.getElementById('cartTotal').textContent = 'Итого: $0.00';
                return;
            }

            container.innerHTML = state.cart.map(item => `
                <div class="cart-item">
                    <div>
                        <div>${item.title.substring(0, 30)}${item.title.length > 30 ? '...' : ''}</div>
                        <small>${item.quantity} × $${item.price_usd.toFixed(2)}</small>
                    </div>
                    <div>
                        <span style="font-weight:600;margin-right:12px;">$${(item.price_usd * item.quantity).toFixed(2)}</span>
                        <button onclick="removeFromCart(${item.id})" style="background:none;border:none;color:red;cursor:pointer;">✕</button>
                    </div>
                </div>
            `).join('');

            const total = state.cart.reduce((sum, item) => sum + item.price_usd * item.quantity, 0);
            document.getElementById('cartTotal').textContent = `Итого: $${total.toFixed(2)}`;
        }

        // ============================================================
        // 7. ОФОРМЛЕНИЕ ЗАКАЗА
        // ============================================================
        async function checkout() {
            if (state.cart.length === 0) {
                showToast('❌ Корзина пуста');
                return;
            }

            const total = state.cart.reduce((sum, item) => sum + item.price_usd * item.quantity, 0);

            if (state.balance < total) {
                tg.showAlert(`❌ Недостаточно средств!\n\n💰 Ваш баланс: $${state.balance.toFixed(2)}\n💸 Сумма заказа: $${total.toFixed(2)}`);
                return;
            }

            // Списываем деньги
            state.balance -= total;
            saveBalance();
            updateBalanceDisplay();

            // Добавляем в заказы
            state.orders.push({
                id: Date.now(),
                items: [...state.cart],
                total: total,
                date: new Date().toLocaleString()
            });

            // Очищаем корзину
            state.cart = [];
            updateCartUI();

            tg.showAlert(`✅ Заказ оформлен!\n\n💸 Списанно: $${total.toFixed(2)}\n💰 Остаток: $${state.balance.toFixed(2)}`);

            // Отправляем уведомление в бот
            await notifyBotOrder(state.orders[state.orders.length - 1]);

            // Переключаемся на заказы
            switchTab('orders');
            renderOrders();
        }

        // ============================================================
        // 8. ОТОБРАЖЕНИЕ ЗАКАЗОВ
        // ============================================================
        function renderOrders() {
            const container = document.getElementById('ordersList');
            if (state.orders.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📦</div>
                        <p>У вас пока нет заказов</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = state.orders.map(order => `
                <div style="background:var(--tg-theme-secondary-bg-color);border-radius:12px;padding:12px;margin-bottom:12px;">
                    <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
                        <span>Заказ #${order.id}</span>
                        <span>${order.date}</span>
                    </div>
                    ${order.items.map(item => `
                        <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--tg-theme-hint-color);">
                            <span>${item.title.substring(0, 30)}...</span>
                            <span>${item.quantity} × $${item.price_usd.toFixed(2)}</span>
                        </div>
                    `).join('')}
                    <div style="text-align:right;font-weight:700;margin-top:8px;border-top:1px solid var(--tg-theme-hint-color);padding-top:8px;">
                        Итого: $${order.total.toFixed(2)}
                    </div>
                </div>
            `).join('');
        }

        // ============================================================
        // 9. УВЕДОМЛЕНИЕ БОТУ
        // ============================================================
        async function notifyBotOrder(order) {
            try {
                // ВАЖНО: замени URL на адрес твоего бота
                // Пока просто логируем
                console.log('📤 Отправка уведомления в бот:', order);
                
                // Пример запроса к твоему боту (если у бота есть API)
                // await fetch('https://your-bot-url.com/webhook', {
                //     method: 'POST',
                //     headers: { 'Content-Type': 'application/json' },
                //     body: JSON.stringify({
                //         user_id: user.id,
                //         order: order
                //     })
                // });
            } catch (e) {
                console.error('Ошибка уведомления бота:', e);
            }
        }

        // ============================================================
        // 10. ПОИСК
        // ============================================================
        function searchProducts(query) {
            if (!query.trim()) {
                renderProducts(state.products);
                return;
            }
            const filtered = state.products.filter(p => 
                p.title.toLowerCase().includes(query.toLowerCase())
            );
            renderProducts(filtered);
        }

        // ============================================================
        // 11. ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК
        // ============================================================
        function switchTab(tab) {
            // Скрываем все вкладки
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            // Показываем нужную
            document.getElementById(tab).classList.add('active');
            
            // Обновляем кнопки меню
            document.querySelectorAll('.bottom-menu button').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.bottom-menu button[data-tab="${tab}"]`).classList.add('active');
            
            state.currentTab = tab;
            
            // Рендерим контент вкладки
            if (tab === 'orders') renderOrders();
        }

        // ============================================================
        // 12. TOAST-УВЕДОМЛЕНИЯ
        // ============================================================
        function showToast(message) {
            // Просто используем Alert от Telegram
            tg.showPopup({
                title: '🛍️',
                message: message,
                buttons: [{ type: 'ok' }]
            });
        }

        // ============================================================
        // 13. ИНИЦИАЛИЗАЦИЯ
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            // Загружаем баланс
            loadBalance();
            
            // Загружаем товары
            state.products = mockProducts;
            renderProducts(state.products);
            
            // Поиск
            document.getElementById('searchInput').addEventListener('input', function(e) {
                searchProducts(e.target.value);
            });

            // Переключение вкладок
            document.querySelectorAll('.bottom-menu button').forEach(btn => {
                btn.addEventListener('click', function() {
                    switchTab(this.dataset.tab);
                });
            });

            // Кнопка оформления заказа
            document.getElementById('checkoutBtn').addEventListener('click', checkout);

            // Показываем кнопку "Назад" в Telegram (если нужно)
            tg.BackButton.show();
            tg.BackButton.onClick(() => {
                tg.close();
            });

            // Логируем запуск
            console.log('✅ Mercari Shop Mini App запущен');
            console.log('👤 Пользователь:', user);
            console.log('💰 Баланс:', state.balance);
        });
    </script>
</body>
</html>
